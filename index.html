// ── Storage ──────────────────────────────────────────────────
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  return Object.keys(v).sort((a,b)=>+a-+b).map(k=>v[k]);
}
function load() {
  try {
    const s = localStorage.getItem(SK);
    if (!s) return null;
    const d = JSON.parse(s);
    if (!d || !d.pick || !d.cust) return null;
    // Normalize all arrays (fix Firebase object-array conversion)
    Object.keys(d.pick).forEach(k => {
      if (d.pick[k]) d.pick[k].products = toArr(d.pick[k].products);
    });
    Object.keys(d.cust).forEach(g => {
      d.cust[g] = toArr(d.cust[g]).map(c => c ? {...c, items: toArr(c.items)} : c).filter(Boolean);
    });
    if (d.tasks) d.tasks = toArr(d.tasks);
    return d;
  } catch(e) {
    try { localStorage.removeItem(SK); } catch(e2) {}
    return null;
  }
}function save(s) { try { localStorage.setItem(SK,JSON.stringify(s)); } catch{} }

// ── Init state ──────────────────────────────────────────────
function parseQty(text) {
  const m = text.match(/^(\d+\.?\d*)\s/);
  return m ? parseFloat(m[1]) : 1;
}

function initPickState() {
  const state = {};
  CLUSTERS.forEach(c => {
    state["cluster_"+c.id] = {
      products: c.aggregate.map((p,i) => ({...p,id:i,picked:false,missing:false,missingQty:0,note:""})),
      done:false, completedAt:null, pickerName:"",
    };
    c.settlements.forEach(s => {
      state["settlement_"+s] = {
        products: (SETTLEMENTS[s]||[]).map((p,i) => ({...p,id:i,picked:false,missing:false,missingQty:0,note:""})),
        done:false, completedAt:null, pickerName:"",
      };
    });
  });
  REMAINING.forEach(s => {
    state["settlement_"+s] = {
      products: (SETTLEMENTS[s]||[]).map((p,i) => ({...p,id:i,picked:false,missing:false,missingQty:0,note:""})),
      done:false, completedAt:null, pickerName:"",
    };
  });
  // Ensure ALL special/personal settlements have a settlement_ key
  SPECIAL.forEach(s => {
    if (!state["settlement_"+s]) {
      state["settlement_"+s] = {
        products: (SETTLEMENTS[s]||[]).map((p,i) => ({...p,id:i,picked:false,missing:false,missingQty:0,note:""})),
        done:false, completedAt:null, pickerName:"",
      };
    }
  });
  return state;
}

function initCustState() {
  const state = {};
  const processGroup = (groupKey, customers) => {
    state[groupKey] = customers.map((c,ci) => ({
      ...c, id:ci,
      items: c.items.map((item,ii) => ({
        text:item, id:ii, picked:false, missing:false,
        missingQty:0, maxQty:parseQty(item), note:"",
      })),
      note:"", done:false, pickerName:"", inProgress:false,
    }));
  };
  Object.keys(CUSTOMERS).forEach(g => processGroup(g, CUSTOMERS[g]||[]));
  Object.keys(PERSONAL_PACKING).forEach(s => {
    if (!state[s]) processGroup(s, PERSONAL_PACKING[s]||[]);
  });
  return state;
}

function mergeLoadedCustState(saved, fresh) {
  const merged = {};
  Object.keys(fresh).forEach(group => {
    if (!saved[group]) { merged[group] = fresh[group]; return; }
    merged[group] = saved[group].map((c, ci) => {
      const freshC = fresh[group][ci];
      return {
        ...c,
        pickerName: c.pickerName || "",
        inProgress: c.inProgress || false,
        items: (c.items||[]).map((it, ii) => ({
          ...it,
          maxQty: (it.maxQty > 0 ? it.maxQty : freshC?.items?.[ii]?.maxQty) || 1,
        }))
      };
    });
  });
  return merged;
}

// ── Helpers ──────────────────────────────────────────────────
function custGroupKey(settlement) { return CUSTOMER_MAP[settlement] || settlement; }
function isPersonal(settlement) { return ALL_PERSONAL.includes(settlement); }

function getSettlementDone(settlement, pickState, custState) {
  if (isPersonal(settlement)) {
    // Done if settlement products are all picked/missing (from cluster distribution table)
    const sk = "settlement_"+settlement;
    if (pickState[sk]?.done) return true;
    const ss = pickState[sk];
    if (ss && ss.products.length > 0 && (Array.isArray(ss.products)?ss.products:Object.values(ss.products)).every(p => p.picked || p.missing)) return true;
    // Done if all customers are done
    const custs = custState[custGroupKey(settlement)] || [];
    if (custs.length > 0 && custs.every(c => c.done)) return true;
    // Done if all customer items are picked or missing
    if (custs.length > 0 && custs.every(c => c.items.every(it => it.picked || it.missing))) return true;
    return false;
  }
  // Settlement is done only if explicitly marked done
  if (pickState["settlement_"+settlement]?.done) return true;
  // OR all its products are picked/missing
  const ss = pickState["settlement_"+settlement];
  if (ss && ss.products.length > 0 && (Array.isArray(ss.products)?ss.products:Object.values(ss.products)).every(p=>p.picked||p.missing)) return true;
  return false;
}

// ── Helper: sum quantities from customer items ──────────────────
function itemQty(itemText) {
  if (typeof itemText === 'string') {
    const m = itemText.match(/^([\d.]+)/);
    return m ? parseFloat(m[1]) : 1;
  }
  // item object with .text field
  const t = itemText.text || '';
  const m = t.match(/^([\d.]+)/);
  return m ? parseFloat(m[1]) : 1;
}
function sumItemsQty(items) {
  return items.reduce((a, it) => a + itemQty(it.text || it), 0);
}
function sumPickedQty(items) {
  return items.filter(i=>i.picked).reduce((a, it) => a + itemQty(it.text || it), 0);
}
function sumMissingQty(items) {
  return items.filter(i=>i.missing).reduce((a, it) => a + itemQty(it.text || it), 0);
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }
  componentDidCatch(error) { this.setState({error: error.message}); }
  render() {
    if (this.state.error) return (
      <div style={{padding:24,direction:'rtl',fontFamily:'Arial'}}>
        <h2>⚠️ שגיאה בטעינה</h2>
        <p style={{color:'#dc2626',fontSize:13}}>{this.state.error}</p>
        <button onClick={()=>window.location.reload()}
          style={{padding:'10px 20px',background:'#2563eb',color:'#fff',border:'none',borderRadius:8,cursor:'pointer'}}>
          רענן דף
        </button>
      </div>
    );
    return this.props.children;
  }
}

function App() {
  const [screen, setScreen] = useState("home");
  const [activeCluster, setActiveCluster] = useState(null);
  const [activeSettlement, setActiveSettlement] = useState(null);
  const [activeCustomerId, setActiveCustomerId] = useState(null);
  const [clusterTab, setClusterTab] = useState("distribution");
  const [pickState, setPickState] = useState(() => {
    const saved = load();
    console.log('localStorage load result:', saved ? 'HAS DATA' : 'NULL/EMPTY');
    if (!saved?.pick) return initPickState();
    // Normalize saved pick: fix Firebase-converted arrays (objects with numeric keys)
    try {
      Object.keys(saved.pick).forEach(k => {
        if (saved.pick[k] && saved.pick[k].products) {
          const p = saved.pick[k].products;
          if (!Array.isArray(p)) {
            saved.pick[k].products = Object.keys(p).sort((a,b)=>+a-+b).map(i=>p[i]);
          }
        }
      });
    } catch(e) { return initPickState(); }
    // Merge: ensure all required settlement_ and cluster_ keys exist
    const fresh = initPickState();
    const merged = {...saved.pick};
    Object.keys(fresh).forEach(k => {
      if (!merged[k]) merged[k] = fresh[k];
    });
    return merged;
  });
  const [custState, setCustState] = useState(() => {
    const saved = load();
    const fresh = initCustState();
    if (!saved?.cust) return fresh;
    try {
      // Normalize saved cust: fix Firebase-converted arrays
      Object.keys(saved.cust).forEach(g => {
        if (!Array.isArray(saved.cust[g])) {
          const v = saved.cust[g];
          saved.cust[g] = Object.keys(v).sort((a,b)=>+a-+b).map(i=>v[i]);
        }
        saved.cust[g].forEach(c => {
          if (c && c.items && !Array.isArray(c.items)) {
            const it = c.items;
            c.items = Object.keys(it).sort((a,b)=>+a-+b).map(i=>it[i]);
          }
        });
      });
      return mergeLoadedCustState(saved.cust, fresh);
    } catch(e) { return fresh; }
  });
  const [dashTab, setDashTab] = useState("overview");
  const [showProductsModal, setShowProductsModal] = useState(false);
  const [tasks, setTasks] = useState(() => {
    const saved = load();
    if (!saved?.tasks) return [];
    // Normalize: Firebase might convert arrays to objects
    if (Array.isArray(saved.tasks)) return saved.tasks;
    return Object.keys(saved.tasks).sort((a,b)=>+a-+b).map(k=>saved.tasks[k]);
  });
  const [newTaskText, setNewTaskText] = useState("");

  // ── Real-time sync ────────────────────────────────────────
  const [fbConnected, setFbConnected] = useState(false);
  const [fbLoaded, setFbLoaded] = useState(!USE_FIREBASE); // true immediately if no Firebase
  const resetAtRef  = React.useRef(0);
  const sessionId   = React.useRef(Math.random().toString(36).slice(2,8));
  const fbDone      = React.useRef(false);
  const fbFullSynced = React.useRef(false); // true after first full state write

  function normPick(pick) {
    if (!pick) return {};
    const out = {};
    // Get mapping from sanitized key back to original key
    const allKeys = Object.keys(initPickState());
    const keyMap = {};
    allKeys.forEach(k => { keyMap[fbKey(k)] = k; });
    Object.keys(pick).forEach(fbk => {
      const e = pick[fbk];
      if (!e || typeof e !== 'object') return;
      const origKey = keyMap[fbk] || fbk; // use original key if found
      out[origKey] = {...e, products: toArr(e.products)};
    });
    return out;
  }
  function normCust(cust) {
    if (!cust) return {};
    const out = {};
    Object.keys(cust).forEach(g => {
      out[g] = toArr(cust[g])
        .filter(c => c && typeof c === 'object')
        .map(c => ({...c, items: toArr(c.items).filter(it => it && typeof it === 'object')}));
    });
    return out;
  }

  // Granular writes — only changed path, not full 1.7MB
  // Sanitize key for Firebase (no . # $ / [ ] allowed)
  function fbKey(k) { return k.replace(/[.#$/\[\]]/g, '_'); }

  function fbWritePick(sk, products) {
    if (!USE_FIREBASE || !window._fbDb) return;
    if (!window._fbPickT) window._fbPickT = {};
    clearTimeout(window._fbPickT[sk]);
    window._fbPickT[sk] = setTimeout(() => {
      const u = {'_sid': sessionId.current, '_ts': Date.now()};
      u['pick/' + fbKey(sk) + '/products'] = products;
      window._fbDb.ref('likut/' + SK).update(u)
        .catch(e => console.error('FB write ERROR:', e));
    }, 300);
  }

  // Write full pickState to Firebase (called after first user action in session)
  function fbWriteFullState(currentPick) {
    if (!USE_FIREBASE || !window._fbDb || fbFullSynced.current) return;
    fbFullSynced.current = true;
    const u = {'_sid': sessionId.current, '_ts': Date.now()};
    let totalProducts = 0;
    Object.keys(currentPick).forEach(k => {
      u['pick/' + fbKey(k) + '/products'] = currentPick[k].products;
      u['pick/' + fbKey(k) + '/done'] = currentPick[k].done || false;
      totalProducts += (currentPick[k].products || []).length;
    });
    console.log('FB FULL SYNC: writing', Object.keys(currentPick).length, 'settlements,', totalProducts, 'products');
    window._fbDb.ref('likut/' + SK).update(u)
      .then(() => console.log('FB FULL SYNC: OK'))
      .catch(e => console.error('FB full sync ERROR:', e));
  }

  function fbWritePickField(sk, field, val) {
    if (!USE_FIREBASE || !window._fbDb) return;
    const u = {};
    u['pick/' + fbKey(sk) + '/' + field] = val;
    u['_sid'] = sessionId.current;
    u['_ts']  = Date.now();
    window._fbDb.ref('likut/' + SK).update(u).catch(e => console.warn('FB:', e));
  }
  function fbWriteCust(group, arr) {
    if (!USE_FIREBASE || !window._fbDb) return;
    if (!window._fbCustT) window._fbCustT = {};
    clearTimeout(window._fbCustT[group]);
    window._fbCustT[group] = setTimeout(() => {
      const u = {};
      u['cust/' + fbKey(group)] = arr;
      u['_sid'] = sessionId.current;
      u['_ts']  = Date.now();
      window._fbDb.ref('likut/' + SK).update(u).catch(e => console.warn('FB:', e));
    }, 300);
  }

  function fbWriteTasks(newTasks) {
    if (!USE_FIREBASE || !window._fbDb) return;
    clearTimeout(window._fbTaskTimer);
    window._fbTaskTimer = setTimeout(() => {
      const u = {};
      u['tasks'] = newTasks;
      u['_sid'] = sessionId.current;
      u['_ts'] = Date.now();
      console.log('fbWriteTasks: sending update with sid', sessionId.current);
      window._fbDb.ref('likut/' + SK).update(u).catch(e => console.warn('FB tasks:', e));
    }, 300);
  }

  // Firebase init — runs once
  useEffect(() => {
    if (!USE_FIREBASE || fbDone.current) return;
    fbDone.current = true;
    // Fallback: if Firebase doesn't respond in 3s, show local data
    setTimeout(() => { setFbLoaded(true); }, 3000);
    try {
      const app = firebase.apps.length
        ? firebase.apps[0]
        : firebase.initializeApp(FIREBASE_CONFIG);
      const db = firebase.database(app);
      window._fbDb = db;
      db.ref('.info/connected').on('value', s => setFbConnected(!!s.val()));

      // On first connection: always load from Firebase (ignore localStorage)
      let firstLoad = true;
      // Listen on full state — fires on ANY change from any device
      db.ref('likut/' + SK).on('value', snap => {
        const d = snap.val();
        if (!d) { firstLoad = false; return; }
        console.log('FB snap received, firstLoad:', firstLoad, '_sid:', d._sid, 'mine:', sessionId.current);
        // On first load: always apply Firebase data (it's the source of truth)
        // On subsequent fires: skip our own writes
        // Skip our own echo ALWAYS (even on firstLoad)
        if (d._sid === sessionId.current) { 
          firstLoad = false;
          setFbLoaded(true);
          return; 
        }
        firstLoad = false;
        setFbLoaded(true); // Firebase data arrived — hide loading screen
        // Handle reset
        if (d._resetAt && d._resetAt > resetAtRef.current) {
          resetAtRef.current = d._resetAt;
          const fp = initPickState(), fc = initCustState();
          setPickState(fp); setCustState(fc); setTasks([]);
          save({pick:fp, cust:fc, tasks:[]});
          return;
        }
        if (d._resetAt && d._resetAt < resetAtRef.current) return;
        // Apply remote state directly (from another device)
        try {
          if (d.pick) setPickState(() => {
            const fixed = normPick(d.pick);
            const fresh = initPickState();
            Object.keys(fresh).forEach(k => { if (!fixed[k]) fixed[k] = fresh[k]; });
            return fixed;
          });
          if (d.cust) setCustState(() => mergeLoadedCustState(normCust(d.cust), initCustState()));
          if (d.tasks) { console.log('Applying tasks from FB:', toArr(d.tasks).length); setTasks(toArr(d.tasks)); }
          save(d);
        } catch(e) { console.warn('FB apply error:', e); }
      });
    } catch(e) { console.warn('FB init error:', e); }
  }, []);

  // Save to localStorage on every change
  useEffect(() => {
    save({pick: pickState, cust: custState, tasks});
  }, [pickState, custState, tasks]);

  // Write full state to Firebase when connected — ensures new devices see current data
  useEffect(() => {
    if (!fbConnected || !USE_FIREBASE || !window._fbDb || fbFullSynced.current) return;
    const hasData = Object.values(pickState).some(s =>
      toArr(s.products).some(p => p.picked || p.missing)
    );
    if (hasData) {
      console.log('Auto full sync on connect');
      fbWriteFullState(pickState);
    }
    // Also sync tasks and cust if they exist
    if (USE_FIREBASE && window._fbDb && !fbFullSynced.current) {

  // ── Pick helpers ──────────────────────────────────────────
  function batchToggleSettlement(updates) {
    setPickState(prev => {
      const next = {...prev};
      Object.keys(updates).forEach(sk => {
        next[sk] = {...prev[sk], products: updates[sk]};
        fbWritePick(sk, updates[sk]);
      });
      return next;
    });

      const products = toArr(prev[sk].products).map(p => {

        return upd;
      });
      fbWritePick(sk, products);
      return {...prev, [sk]: {...prev[sk], products}};
    });

  function setItemField(sk, id, field, val) {
    setPickState(prev => ({

  function markDone(sk) {

      return {...prev, [group]: newGroup};

  function markProductMissingGlobal(productName, setMissing) {
    console.log('markProductMissingGlobal called:', productName, 'setMissing:', setMissing);
    setPickState(prev => {
      const next = {...prev};
      const changedSettlements = [];
      Object.keys(next).forEach(sk => {
        const entry = next[sk];
        const prod = toArr(entry.products).find(p => p.name === productName);
        if (prod && !prod.picked) {
          const newProducts = toArr(entry.products).map(p =>
            p.name === productName && !p.picked
              ? {...p, missing: setMissing, picked: false, missingQty: setMissing ? p.qty : 0}
              : p
          );
          next[sk] = {...entry, products: newProducts};
          changedSettlements.push(sk);
        }
      });
      // Sync all changed settlements to Firebase in one batch update
      console.log('markMissing: changed settlements =', changedSettlements.length, changedSettlements);
      if (USE_FIREBASE && window._fbDb && changedSettlements.length > 0) {
        const u = {'_sid': sessionId.current, '_ts': Date.now()};
        changedSettlements.forEach(sk => {
          u['pick/' + fbKey(sk) + '/products'] = next[sk].products;
        });
        console.log('markMissing: writing to FB, keys:', Object.keys(u));
        window._fbDb.ref('likut/' + SK).update(u)
          .then(() => console.log('markMissing: FB write OK'))
          .catch(e => console.error('FB markMissing ERROR:', e));
      } else {
        console.log('markMissing: SKIPPED FB write. USE_FIREBASE=', USE_FIREBASE, '_fbDb=', !!window._fbDb, 'changed=', changedSettlements.length);
      }
      return next;
    });
    setCustState(prev => {
      const next = {...prev};
      const changedGroups = [];
      Object.keys(next).forEach(group => {
        const newGroup = toArr(next[group]).map(c => ({
          ...c,
          items: toArr(c.items).map(it => {
            const name = (it.text||"").replace(/^[\d.]+ \S+ - /, '');
            if (name === productName && !it.picked)
              return {...it, missing: setMissing, picked: false, missingQty: setMissing ? (it.maxQty||0) : 0};
            return it;
          })
        }));
        if (JSON.stringify(newGroup) !== JSON.stringify(next[group])) {
          changedGroups.push(group);
        }
        next[group] = newGroup;
      });
      // Sync all changed customer groups to Firebase
      if (USE_FIREBASE && window._fbDb && changedGroups.length > 0) {
        const u = {'_sid': sessionId.current, '_ts': Date.now()};
        changedGroups.forEach(group => {
          u['cust/' + fbKey(group)] = next[group];
        });
        window._fbDb.ref('likut/' + SK).update(u)
          .catch(e => console.warn('FB markMissing cust:', e));
      }
      return next;
    });
  }

  // ── Tasks ─────────────────────────────────────────────────
  function addTask(text) {
    if (!text.trim()) return;
    setTasks(prev => {
      const newTasks = [...toArr(prev), {id:Date.now(), text:text.trim(), status:"open", createdAt:new Date().toLocaleTimeString("he-IL")}];
      console.log('addTask: writing', newTasks.length, 'tasks to Firebase');
      fbWriteTasks(newTasks);
      return newTasks;
    });
  }
  function setTaskStatus(id, status) {
    setTasks(prev => {
      const newTasks = toArr(prev).map(t => t.id===id ? {...t,status} : t);
      fbWriteTasks(newTasks);
      return newTasks;
    });
  }
  function deleteTask(id) {
    setTasks(prev => {
      const newTasks = toArr(prev).filter(t => t.id!==id);
      fbWriteTasks(newTasks);
      return newTasks;
    });
  }

  // ── Reset ─────────────────────────────────────────────────
  function resetAll() {
    if (!window.confirm("לאפס את כל נתוני הליקוט?")) return;
    const p = initPickState(), c = initCustState(), t = [];
    setPickState(p); setCustState(c); setTasks(t);
    save({pick:p, cust:c, tasks:t});
    if (USE_FIREBASE && window._fbDb) {
      const now = Date.now();
      resetAtRef.current = now;
      fbFullSynced.current = false;
      window._fbDb.ref("likut/" + SK).set({pick:p, cust:c, tasks:t, _resetAt:now, _sid:sessionId.current, _ts:now})
        .catch(e => console.warn("FB reset:", e));
    }
  }

  // ── Global stats ──────────────────────────────────────────
  const settlementKeys = Object.keys(pickState).filter(k => k.startsWith("settlement_"));
  const totalSettlements = settlementKeys.length;
  const doneSettlements = settlementKeys.filter(k => {
    const s = k.replace("settlement_","");
    return getSettlementDone(s, pickState, custState);
  }).length;

  let totalItems=0, pickedItems=0, missingItems=0, totalCustomers=0, doneCustomers=0;
  // CORRECT counting: clusters + לוחמי (standalone) + remaining only
  // אילון/חניתה/שלומי are already inside clusters → don't count twice

  // 1. Cluster aggregates (includes אילון/חניתה/שלומי)
  CLUSTERS.forEach(c => {
    const cs = pickState["cluster_"+c.id];
    if (!cs) return;
    // For each cluster product: check cluster aggregate AND settlement products
    toArr(cs.products).forEach(p => {
      totalItems += Math.round(p.qty);
      let isPicked = p.picked;
      let missingQty = 0;
      // Check ALL settlement products (personal and non-personal) for picked/missing state
      c.settlements.forEach(s=>{
        const sp=pickState["settlement_"+s]?.products.find(p2=>p2.name===p.name);
        if(sp){
          if(sp.picked) isPicked=true;
          if(sp.missing&&!sp.picked) missingQty += Math.round(sp.missingQty>0?sp.missingQty:sp.qty);
        }
      });
      if(isPicked) pickedItems += Math.round(p.qty);
      if(missingQty > 0 && !isPicked) missingItems += missingQty;
    });
    c.settlements.filter(s=>isPersonal(s)).forEach(s=>{
      const custs=custState[custGroupKey(s)]||[];
      totalCustomers+=custs.length;
      doneCustomers+=custs.filter(c=>c.done).length;
    });
  });

  // 2. לוחמי הגטאות — not in any cluster
  const _lSs = pickState["settlement_לוחמי הגטאות"];
  if (_lSs) {
    toArr(_lSs.products).forEach(p => {
      totalItems += Math.round(p.qty);
      if (p.picked) pickedItems += Math.round(p.qty);
      if (p.missing && !p.picked) missingItems += Math.round(p.qty);
    });
  }
  const _lCusts = custState["לוחמי הגטאות"]||[];
  totalCustomers += _lCusts.length;
  doneCustomers += _lCusts.filter(c=>c.done).length;

  // 2b. בנק מזרחי — SPECIAL but not in any cluster
  const _bmSs = pickState["settlement_בנק מזרחי"];
  if (_bmSs) {
    toArr(_bmSs.products).forEach(p => {
      totalItems += Math.round(p.qty);
      if (p.picked) pickedItems += Math.round(p.qty);
      if (p.missing && !p.picked) missingItems += Math.round(p.qty);
    });
  }
  const _bmCusts = custState["בנק מזרחי"]||[];
  totalCustomers += _bmCusts.length;
  doneCustomers += _bmCusts.filter(c=>c.done).length;

  // 2c. אריזה אישית (2 units) — removed from settlement data but counted in total
  totalItems += 2;

  // 3. Remaining settlements (not in any cluster)
  REMAINING.forEach(s => {
    const ss = pickState["settlement_"+s];
    if (!ss) return;
    toArr(ss.products).forEach(p => {
      totalItems += Math.round(p.qty);
      if (p.picked) pickedItems += Math.round(p.qty);
      if (p.missing && !p.picked) missingItems += Math.round(p.qty);
    });
  });

      onToggleCustDone={(g,cid)=>markCustDone(g,cid)}
      onSetCustNote={(g,cid,n)=>setCustNote(g,cid,n)}
      onSetCustItemMissingQty={(g,cid,iid,qty)=>setCustItemMissingQty(g,cid,iid,qty)}
      onSelectSettlement={s=>{setActiveSettlement(s);setScreen("settlement");}}

          onBatchToggle={batchToggleSettlement}
    />;

  // ── HOME ─────────────────────────────────────────────────
  return (
    <div style={S.app}>

          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:32}}>🛒</span>
            <div>
              <div style={S.h1}>מערכת ליקוט שוק</div>
              <div style={S.h2}>שבוע 25 · יוני 2026</div>
            </div>
          </div>
          <button onClick={resetAll}
            style={{background:"transparent",border:"1px solid rgba(255,255,255,0.3)",color:"rgba(255,255,255,0.6)",fontSize:10,padding:"2px 8px",borderRadius:6,cursor:"pointer",fontFamily:"inherit"}}>
            🔄 איפוס נתונים
          </button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
          <div style={{display:"flex",gap:6}}>

            {USE_FIREBASE&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:fbConnected?"#16a34a":"#dc2626",color:"#fff",fontWeight:700}}>

            </span>}
          </div>
          {(() => {

                  <span style={{fontSize:13}}>📋</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#fff"}}>{openTasks} משימות פתוחות</span>
                </div>
              : <div onClick={()=>goToDashboard("tasks")} style={{background:"#16a34a",border:"1px solid #86efac",borderRadius:8,padding:"3px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{fontSize:13}}>✅</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#fff"}}>אין משימות פתוחות</span>
                </div>;
          })()}
        </div>
      </div>

      {/* Stats bar */}
      <div style={{display:"flex",gap:6,padding:"10px 10px 8px",background:"#fff",borderBottom:"1px solid #e5e7eb"}}>

        <div onClick={()=>setShowProductsModal(true)} style={{flex:1,background:missingItems>0?"#fef2f2":"#f9fafb",borderRadius:10,padding:"6px 4px",textAlign:"center",borderTop:"3px solid "+(missingItems>0?"#dc2626":"#2563eb"),cursor:"pointer"}}>

        <div onClick={()=>goToDashboard("tasks")} style={{flex:1,background:toArr(tasks).filter(t=>t.status!=="done").length>0?"#faf5ff":"#f9fafb",borderRadius:10,padding:"6px 4px",textAlign:"center",cursor:"pointer",borderTop:"3px solid #7c3aed"}}>

          <div style={{fontSize:10,color:"#7c3aed",fontWeight:600}}>משימות ←</div>
        </div>
      </div>

      {/* Clusters */}
      <div style={S.sectionLabel}>מקבצי ליקוט</div>
      <div style={{padding:"0 12px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {CLUSTERS.map((c,i) => {
          const col = CLUSTER_COLORS[i];
          const ck = "cluster_"+c.id;
          const cs = pickState[ck];
          const total = Math.round(toArr(cs.products).reduce((a,p)=>a+p.qty,0));
          // Picked: all settlements use settlement products state (no custState dependency)

          c.settlements.forEach(s=>{
            const sk2="settlement_"+s; const ss2=pickState[sk2];
            if(!ss2) return;
            toArr(ss2.products).forEach(p=>{

              onClick={()=>goToSettlement(s)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>

              </div>
              <div style={{fontSize:11,color:"#6b7280"}}>
                <div>{done}/{total2} לקוחות</div>
                <div style={{marginTop:2}}>{picked2}/{items2} פריטים</div>
                {missing2>0&&<div style={{color:"#dc2626",fontWeight:600,marginTop:2}}>⚠️ {missing2} חסרים</div>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Products Modal */}
      {showProductsModal && <ProductsModal pickState={pickState} custState={custState} onClose={()=>setShowProductsModal(false)} onMarkMissing={markProductMissingGlobal}/>}

      {/* Remaining */}
      <div style={S.sectionLabel}>יישובים נוספים</div>
      <div style={{padding:"0 12px 80px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {REMAINING.filter(s=>!Object.keys(PERSONAL_PACKING).includes(s)).map(s => {
          const ss = pickState["settlement_"+s];
          if (!ss) return null;
          const totalQty = Math.round(toArr(ss.products).reduce((a,p)=>a+p.qty,0));
          const pickedQty = Math.round(toArr(ss.products).filter(p=>p.picked).reduce((a,p)=>a+p.qty,0));
          const missing3 = toArr(ss.products).filter(p=>p.missing).length;
          const pct3 = Math.round(pickedQty/Math.max(totalQty,1)*100);
          return (
            <div key={s} style={{background:"#fff",border:"2px solid "+(ss.done?"#16a34a":"#e5e7eb"),borderRadius:12,padding:"10px 12px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}
              onClick={()=>goToSettlement(s)}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontWeight:700,fontSize:13}}>{s}</span>
                {ss.done&&<span>✅</span>}
              </div>
              <div style={{height:5,background:"#f3f4f6",borderRadius:999,overflow:"hidden",marginBottom:4}}>
                <div style={{height:"100%",width:pct3+"%",background:ss.done?"#16a34a":"#2563eb",borderRadius:999}}/>
              </div>
              <div style={{fontSize:11,color:"#6b7280",display:"flex",justifyContent:"space-between"}}>
                <span>{pickedQty}/{totalQty} פריטים</span>
                {missing3>0&&<span style={{color:"#dc2626"}}>⚠️{missing3}</span>}
              </div>
              {ss.pickerName&&<div style={{fontSize:11,color:"#374151",marginTop:3,fontWeight:600}}>👷 {ss.pickerName}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Settlement Screen ─────────────────────────────────────────
function SettlementScreen({settlement,sk,state,color,isPersonal,customers,onToggle,onSetField,onMarkDone,onSetPicker,onSelectCustomer,onBack}) {

  const totalQty = Math.round(state.products.reduce((a,p)=>a+p.qty,0));
  const custDone = customers.filter(c=>c.done).length;
  const custMissing = customers.reduce((a,c)=>a+c.items.filter(i=>i.missing).length,0);

    if (search && !p.name.includes(search)) return false;

// ── Cluster Screen ─────────────────────────────────────────────
function ClusterScreen({cluster,color,state,tab,onTabChange,pickState,custState,onToggle,onSetField,onMarkDone,onSetPicker,onToggleSettlement,onSetAnyField,onToggleCustItem,onToggleCustDone,onSetCustNote,onSetCustItemMissingQty,onSelectSettlement,onBack,onBatchToggle}) {
  // Total from cluster aggregate (canonical)
  const total = Math.round(state.products.reduce((a,p)=>a+p.qty,0));
  // Picked: all settlements use settlement products state (no custState dependency)
  let picked = 0;
  cluster.settlements.forEach(s => {
    const sk = "settlement_"+s;
    const ss = pickState[sk];
    if (ss) {
      toArr(ss.products).forEach(p => {
        const cp = state.products.find(cp=>cp.name===p.name);
        if (p.picked || (cp && cp.picked)) picked += p.qty;
      });
    }
  });
  picked = Math.round(picked);
  // ssDone: all settlements done when explicitly marked OR all products picked/missing
  const ssDone = cluster.settlements.filter(s => {
    const sk2 = "settlement_"+s;
    if (pickState[sk2]?.done) return true;
    const ss2 = pickState[sk2];
    if (!ss2 || ss2.products.length===0) return false;
    return ss2.products.every(p=>p.picked||p.missing);
  }).length;

  return (
    <div style={S.app}>
      <div style={{...S.subHeader,borderBottom:"3px solid "+color.accent,background:color.bg}}>
        <Btn onClick={onBack} style={S.backBtn}>→ חזרה</Btn>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:17,color:color.dark}}>{cluster.name}</div>
          <div style={{fontSize:11,color:"#6b7280"}}>{cluster.settlements.join(" · ")}</div>
        </div>
        <Btn onClick={onMarkDone} style={{background:state.done?"#6b7280":color.accent,color:"#fff",fontWeight:700}}>
          {state.done?"בטל":"✅ סיים"}
        </Btn>
      </div>
      <div style={{padding:"8px 14px",background:color.bg,borderBottom:"1px solid "+color.border}}>
        <div style={{fontSize:11,color:color.dark,fontWeight:700,marginBottom:6}}>👷 מלקטים (עד 3):</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[0,1,2].map(idx2=>{
            const names=(state.pickerName||"").split(",");
            const val=(names[idx2]||"").trim();
            return (
              <input key={idx2}
                style={{flex:1,minWidth:80,border:"1px solid "+(idx2===0&&!val?"#fca5a5":color.border),borderRadius:8,padding:"5px 8px",fontSize:12,fontFamily:"inherit",direction:"rtl",background:"#fff"}}
                placeholder={idx2===0?"מלקט ראשי *":idx2===1?"מלקט 2":"מלקט 3"}
                value={val}
                onChange={e=>{
                  const parts=(state.pickerName||"").split(",");
                  while(parts.length<=idx2) parts.push("");
                  parts[idx2]=e.target.value;
                  onSetPicker(parts.map(p=>p.trim()).join(","));
                }}
                onKeyDown={e=>e.stopPropagation()}
                onKeyUp={e=>e.stopPropagation()}
                onKeyPress={e=>e.stopPropagation()}
              />
            );
          })}
        </div>
        {!(state.pickerName||"").split(",").filter(p=>p.trim()).length&&(
          <div style={{fontSize:10,color:"#dc2626",marginTop:4}}>⚠️ יש להזין לפחות מלקט ראשי</div>
        )}
      </div>

      <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #e5e7eb"}}>
        {["distribution","settlements"].map(t=>(
          <button key={t} style={{flex:1,padding:"12px",cursor:"pointer",background:"none",border:"none",fontFamily:"inherit",fontSize:13,fontWeight:600,color:tab===t?color.accent:"#6b7280",borderBottom:"3px solid "+(tab===t?color.accent:"transparent"),marginBottom:-2}}
            onClick={()=>onTabChange(t)}>
            {t==="distribution"?"📋 פריסה וסימון":"🏘️ יישובים ("+ssDone+"/"+cluster.settlements.length+")"}
          </button>
        ))}
      </div>
      

      {!(state.pickerName||"").split(",").filter(p=>p.trim()).length && tab!=="settlements" && (
        <div style={{position:"relative"}}>
          <div style={{pointerEvents:"none",opacity:0.3}}>
            {tab==="distribution" && <DistributionTable cluster={cluster} color={color} pickState={pickState} custState={custState}
              onToggleSettlementItem={()=>{}} onSetSettlementField={()=>{}}
              onToggleCustItem={()=>{}} onToggleCustDone={()=>{}} onSetCustNote={()=>{}} onSetCustItemMissingQty={()=>{}}/>}
          </div>
          <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.7)",zIndex:5,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{textAlign:"center",color:"#92400e",fontSize:14,fontWeight:700,padding:20,background:"#fef3c7",borderRadius:12,border:"2px solid #fde68a"}}>
              🔒 הזן שם מלקט ראשי כדי להתחיל
            </div>
          </div>
        </div>
      )}
      {!!(state.pickerName||"").split(",").filter(p=>p.trim()).length && tab==="distribution" && <>
        <DistributionTable cluster={cluster} color={color} pickState={pickState} custState={custState}
          onToggleSettlementItem={onToggleSettlement}
          onBatchToggle={onBatchToggle}
          onSetSettlementField={(sk,id,f,v)=>onSetAnyField(sk,id,f,v)}
          onToggleCustItem={onToggleCustItem} onToggleCustDone={onToggleCustDone}
          onSetCustNote={onSetCustNote} onSetCustItemMissingQty={onSetCustItemMissingQty}/>
        {/* Done button at bottom of distribution tab */}
        <div style={{padding:"16px 12px 40px",borderTop:"1px solid "+color.border}}>
          <Btn onClick={onMarkDone}
            style={{
              width:"100%",padding:"14px",borderRadius:12,
              border:"2px solid "+(state.done?"#6b7280":color.accent),
              background:state.done?"#6b7280":color.accent,
              color:"#fff",fontSize:15,fontWeight:800,
              touchAction:"manipulation",
            }}>
            {state.done?"↩️ בטל סיום מקבץ":"✅ סיים ליקוט מקבץ"}
          </Btn>
        </div>
      </>}
      {tab==="settlements" && <SettlementCards cluster={cluster} pickState={pickState} custState={custState} color={color} onSelect={onSelectSettlement}/>}
    </div>
  );
}

// ── Distribution Table ─────────────────────────────────────────
function DistributionTable({cluster,color,pickState,custState,onToggleSettlementItem,onSetSettlementField,onToggleCustItem,onToggleCustDone,onSetCustNote,onSetCustItemMissingQty,onBatchToggle}) {
  const [search,setSearch] = useState("");
  const [activeSettlement,setActiveSettlement] = useState(null);

  // Build lookup
  // Use cluster aggregate order (matches CSV product order)
  const productNames = (pickState["cluster_"+cluster.id]?.products||[]).map(p=>({name:p.name,unit:p.unit}));
  const seen = new Set(productNames.map(p=>p.name));
  // Add any products not in aggregate (shouldn't happen but safety net)
  cluster.settlements.forEach(s => (SETTLEMENTS[s]||[]).forEach(p => {
    if (!seen.has(p.name)) { seen.add(p.name); productNames.push({name:p.name,unit:p.unit}); }
  }));
  const lookup = {};
  cluster.settlements.forEach(s => (SETTLEMENTS[s]||[]).forEach(p => {
    if (!lookup[p.name]) lookup[p.name]={};
    lookup[p.name][s]=p.qty;
  }));
  const totals = {};
  productNames.forEach(({name}) => { totals[name]=cluster.settlements.reduce((a,s)=>a+(lookup[name]?.[s]||0),0); });
  const filtered = productNames.filter(p=>!search||p.name.includes(search));

  function toggleAll(name,field) {
    const relevant = cluster.settlements.map(s => {
      const ss=pickState["settlement_"+s];
      return {s, prod:ss?.products.find(p=>p.name===name)||null};
    }).filter(({prod})=>prod&&prod.qty>0);
    const allSet = relevant.every(({prod})=>prod[field]);
    // Batch: update all settlements at once, then write each to Firebase once
    const updates = {};
    relevant.forEach(({s,prod}) => {
      if (prod[field]===!allSet) return; // already in target state
      const sk = "settlement_"+s;
      const products = pickState[sk].products.map(p => {
        if (p.id !== prod.id) return p;
        const upd = {...p, [field]: !allSet};
        if (field==="picked" && upd.picked) { upd.missing=false; upd.missingQty=0; }
        if (field==="missing" && upd.missing) upd.picked=false;
        return upd;
      });
      updates[sk] = products;
    });
    if (Object.keys(updates).length === 0) return;
    // Single setPickState for all settlements
    onBatchToggle(updates);
  }
  function toggleOne(name,s,field) {
    const ss=pickState["settlement_"+s];
    const prod=ss?.products.find(p=>p.name===name);
    if (prod) onToggleSettlementItem("settlement_"+s,prod.id,field);
  }

  return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"8px 12px",background:"#fff",borderBottom:"1px solid #e5e7eb",display:"flex",gap:8}}>
        <input style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"6px 10px",fontSize:13,fontFamily:"inherit",direction:"rtl"}}
          placeholder="חיפוש מוצר..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <span style={{fontSize:11,color:"#9ca3af",alignSelf:"center"}}>{filtered.length} פריטים</span>
      </div>
      <div style={{padding:"8px 12px",background:"#f9fafb",borderBottom:"1px solid #e5e7eb",fontSize:11,color:"#6b7280",}}>
        לחץ ✓ = כולם · ⚠️ = חוסר לכולם · לחץ תא = יישוב בודד
      </div>
      {/* Sticky header row - outside the overflow container */}
      <div style={{position:"sticky",top:0,zIndex:20,overflowX:"auto",background:color.bg,borderBottom:"2px solid "+color.accent,boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,direction:"rtl",minWidth:140+90+cluster.settlements.length*85+"px",tableLayout:"fixed"}}>
          <colgroup>
            <col style={{width:"140px"}}/>
            <col style={{width:"90px"}}/>
            {cluster.settlements.map(s=><col key={s} style={{width:"85px"}}/>)}
          </colgroup>
          <thead>
            <tr style={{background:color.bg}}>
              <th style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:color.dark,width:140}}>מוצר</th>
              <th style={{padding:"8px 6px",textAlign:"center",fontWeight:700,color:color.accent,width:90}}>
                <div>סה"כ</div><div style={{fontSize:9,color:"#9ca3af",fontWeight:400}}>✓/⚠️=כולם</div>
              </th>
              {cluster.settlements.map(s => {
                const isPers = isPersonal(s);
                const sk2="settlement_"+s; const ss2=pickState[sk2];
                const sp2=Math.round((ss2?.products||[]).filter(p=>p.picked).reduce((a,p)=>a+p.qty,0));
                const st2=Math.round((ss2?.products||[]).reduce((a,p)=>a+p.qty,0));
                return (
                  <th key={s} style={{padding:"8px 6px",textAlign:"center",fontWeight:700,color:color.dark,width:85,whiteSpace:"nowrap"}}>
                    <div>{s}</div>
                    {isPers&&<span style={{fontSize:9,color:"#7c3aed"}}>👤</span>}
                    <div style={{fontSize:9,color:"#9ca3af",fontWeight:400}}>{sp2}/{st2}</div>
                  </th>
                );
              })}
            </tr>
          </thead>
        </table>
      </div>

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,direction:"rtl",minWidth:140+90+cluster.settlements.length*85+"px",tableLayout:"fixed"}}>
          <colgroup>
            <col style={{width:"140px"}}/>
            <col style={{width:"90px"}}/>
            {cluster.settlements.map(s=><col key={s} style={{width:"85px"}}/>)}
          </colgroup>
          <thead style={{display:"none"}}>
            <tr style={{background:color.bg}}>
              <th style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:color.dark,borderBottom:"2px solid "+color.accent,minWidth:140,position:"sticky",right:0,background:color.bg,zIndex:3}}>מוצר</th>
              <th style={{padding:"8px 6px",textAlign:"center",fontWeight:700,color:color.accent,borderBottom:"2px solid "+color.accent,minWidth:90,background:color.bg}}>
                <div>סה"כ</div><div style={{fontSize:9,color:"#9ca3af",fontWeight:400}}>✓/⚠️=כולם</div>
              </th>
              {cluster.settlements.map(s => {
                const isPers = isPersonal(s);
                const sk2="settlement_"+s; const ss2=pickState[sk2];
                const sp2=Math.round((ss2?.products||[]).filter(p=>p.picked).reduce((a,p)=>a+p.qty,0));
                const st2=Math.round((ss2?.products||[]).reduce((a,p)=>a+p.qty,0));
                return (
                  <th key={s} style={{padding:"8px 6px",textAlign:"center",fontWeight:700,color:color.dark,borderBottom:"2px solid "+color.accent,minWidth:85,whiteSpace:"nowrap"}}>
                    <div>{s}</div>
                    {isPers&&<span style={{fontSize:9,background:"#faf5ff",color:"#7c3aed",border:"1px solid #ddd6fe",borderRadius:4,padding:"1px 4px"}}>👤</span>}
                    <div style={{fontSize:9,color:"#9ca3af",fontWeight:400}}>{sp2}/{st2}</div>
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {filtered.map(({name,unit},ri) => {
              const totalQty=totals[name]; if(totalQty===0) return null;
              const settProds=cluster.settlements.map(s=>{const ss=pickState["settlement_"+s]; return ss?.products.find(p=>p.name===name)||null;});
              const rel=settProds.filter(p=>p&&p.qty>0);
              const allPicked=rel.length>0&&rel.every(p=>p.picked);
              const allMissing2=rel.length>0&&rel.every(p=>p.missing);
              const someMissing=rel.some(p=>p.missing);
              const rowBg=allPicked?"#f0fdf4":allMissing2?"#fef2f2":ri%2===0?"#fff":color.bg+"50";
              return (
                <tr key={name} style={{background:rowBg,borderBottom:"1px solid #f3f4f6"}}>
                  <td style={{padding:"8px 12px",fontWeight:600,color:allPicked?"#15803d":allMissing2?"#dc2626":"#111",position:"sticky",right:0,background:rowBg,zIndex:1,borderLeft:"2px solid #e5e7eb",textDecoration:allPicked?"line-through":"none"}}>
                    <div style={{fontSize:13}}>{name}</div>
                    <div style={{fontSize:10,color:"#9ca3af"}}>{unit}</div>
                  </td>
                  <td style={{padding:"6px 4px",textAlign:"center",background:color.bg+"80",borderLeft:"1px solid #e5e7eb",borderRight:"1px solid #e5e7eb"}}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <Btn onClick={()=>toggleAll(name,"picked")} style={{width:54,height:26,borderRadius:6,border:"2px solid "+(allPicked?color.accent:"#d1d5db"),background:allPicked?color.accent:"#fff",color:allPicked?"#fff":color.accent,fontWeight:800,fontSize:12,padding:0,touchAction:"manipulation"}}>
                        {allPicked?"✓":"✓"} {totalQty}
                      </Btn>
                      <Btn onClick={()=>toggleAll(name,"missing")} style={{width:54,height:22,borderRadius:5,border:"2px solid "+(allMissing2?"#dc2626":someMissing?"#fca5a5":"#e5e7eb"),background:allMissing2?"#dc2626":someMissing?"#fef2f2":"#fff",color:allMissing2?"#fff":someMissing?"#dc2626":"#9ca3af",fontWeight:700,fontSize:11,padding:0,touchAction:"manipulation"}}>
                        {allMissing2?"⚠️כולם":someMissing?"⚠️חלק":"⚠️חסר"}
                      </Btn>
                    </div>
                  </td>
                  {cluster.settlements.map((s,si) => {
                    const qty=lookup[name]?.[s]||0;
                    const prod=settProds[si];
                    const isPicked=prod?.picked, isMissing=prod?.missing;
                    if(qty===0) return <td key={s} style={{padding:"8px 4px",textAlign:"center",color:"#e5e7eb"}}>—</td>;
                    return (
                      <td key={s} style={{padding:"6px 4px",textAlign:"center",background:isPicked?"#dcfce7":isMissing?"#fee2e2":"transparent",borderRight:"1px solid #f3f4f6"}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                          <Btn onClick={()=>toggleOne(name,s,"picked")} style={{width:46,height:26,borderRadius:6,border:"2px solid "+(isPicked?"#16a34a":"#d1d5db"),background:isPicked?"#16a34a":"#fff",color:isPicked?"#fff":"#374151",fontWeight:700,fontSize:12,padding:0,touchAction:"manipulation"}}>
                            {isPicked?"✓ "+qty:qty}
                          </Btn>
                          {!isPicked&&<>
                            <Btn onClick={()=>toggleOne(name,s,"missing")} style={{width:46,height:22,borderRadius:5,border:"2px solid "+(isMissing?"#dc2626":"#e5e7eb"),background:isMissing?"#dc2626":"#fff",color:isMissing?"#fff":"#9ca3af",fontWeight:700,fontSize:11,padding:0,touchAction:"manipulation"}}>
                              {isMissing?"⚠️":"חסר"}
                            </Btn>
                            {isMissing&&prod&&(
                              <div style={{display:"flex",alignItems:"center",gap:2,marginTop:2}}>
                                <Btn onClick={(e)=>{e.stopPropagation();const v=Math.max(0,(prod.missingQty>0?prod.missingQty:prod.qty)-1);onSetSettlementField("settlement_"+s,prod.id,"missingQty",v);}}
                                  style={{width:20,height:20,borderRadius:4,border:"1px solid #fca5a5",background:"#fff",fontSize:13,fontWeight:700,color:"#dc2626",padding:0,touchAction:"manipulation"}}>−</Btn>
                                <span style={{fontSize:13,fontWeight:800,color:"#dc2626",minWidth:22,textAlign:"center"}}>{prod.missingQty>0?prod.missingQty:prod.qty}</span>
                                <Btn onClick={(e)=>{e.stopPropagation();const v=Math.min((prod.missingQty>0?prod.missingQty:prod.qty)+1,prod.qty);onSetSettlementField("settlement_"+s,prod.id,"missingQty",v);}}
                                  style={{width:20,height:20,borderRadius:4,border:"1px solid #fca5a5",background:"#fff",fontSize:13,fontWeight:700,color:"#dc2626",padding:0,touchAction:"manipulation"}}>+</Btn>
                                <span style={{fontSize:9,color:"#9ca3af"}}>/{qty}</span>
                              </div>
                            )}
                          </>}
                        </div>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Settlement Cards (in cluster) ─────────────────────────────
function SettlementCards({cluster,pickState,custState,color,onSelect}) {
  return (
    <div style={{padding:"12px",paddingBottom:80}}>
      {cluster.settlements.map(s => {
        const sk="settlement_"+s;
        const ss=pickState[sk];
        if(!ss) return null;
        // All settlements use settlement products state — no custState dependency in cluster context
        const done=ss.done||toArr(ss.products).every(p=>p.picked||p.missing);
        const isPers=isPersonal(s);
        const picked=Math.round(toArr(ss.products).filter(p=>p.picked).reduce((a,p)=>a+p.qty,0));
        const total=Math.round(toArr(ss.products).reduce((a,p)=>a+p.qty,0));
        const missing=toArr(ss.products).filter(p=>p.missing).length;
        const pct=Math.round(picked/Math.max(total,1)*100);
        return (
          <div key={s} style={{background:"#fff",border:"2px solid "+(done?color.accent:color.border),borderRadius:12,padding:"14px",marginBottom:10,cursor:"pointer",boxShadow:"0 1px 4px "+color.accent+"15"}}
            onClick={()=>onSelect(s)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontWeight:800,fontSize:15}}>{s}{isPers?" 👤":""}</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {missing>0&&<span style={{color:"#dc2626",fontSize:13}}>⚠️{missing}</span>}
                {done?<span style={{fontSize:18}}>✅</span>:<span style={{fontSize:18,color:"#d1d5db"}}>○</span>}
              </div>
            </div>
            <div style={{height:7,background:"#f3f4f6",borderRadius:999,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:pct+"%",background:done?color.accent:color.accent+"88",borderRadius:999,transition:"width 0.3s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6b7280"}}>
              <span>{picked}/{total} פריטים</span>
              {ss.completedAt&&<span>⏱ {ss.completedAt}</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Customer Pick Screen ───────────────────────────────────────
function CustomerPickScreen({settlement,customer,onToggle,onSetItemNote,onSetNote,onMarkDone,onSetItemMissingQty,onSetPickerName,onSetInProgress,onBack}) {
  const [showNote,setShowNote]=useState({});
  if(!customer) return <div style={S.app}><Btn onClick={onBack} style={S.backBtn}>חזרה</Btn></div>;
  const picked=customer.items.filter(i=>i.picked).length;
  const missing=customer.items.filter(i=>i.missing).length;
  const total=customer.items.length;
  const allMarked=customer.items.every(it=>it.picked||it.missing);
  const remaining=total-(picked+missing);
  return (
    <div style={S.app}>
      <div style={{...S.subHeader,borderBottom:"3px solid #7c3aed",background:"#faf5ff"}}>
        <Btn onClick={onBack} style={S.backBtn}>→ חזרה</Btn>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:16,color:"#6d28d9"}}>{customer.name}</div>
