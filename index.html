        </div>
      </div>
      <div style={{padding:"10px 12px",background:"#faf5ff",borderBottom:"1px solid #ede9fe"}}>
        <div style={{fontSize:12,color:"#7c3aed",marginBottom:8}}>📞 {customer.phone}</div>
        {/* Picker name per customer */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span style={{fontSize:12,color:"#6d28d9",fontWeight:600,whiteSpace:"nowrap"}}>👷 מלקט:</span>
          {customer.inProgress && customer.pickerName
            ? <div style={{flex:1,background:"#ede9fe",borderRadius:8,padding:"6px 10px",fontSize:13,fontWeight:700,color:"#6d28d9"}}>
                🔒 {customer.pickerName}
                <span style={{fontSize:10,color:"#9ca3af",fontWeight:400,marginRight:8}}> (נעול)</span>
              </div>
            : <input
                style={{flex:1,border:"1px solid "+((!customer.pickerName)?"#fca5a5":"#ddd6fe"),borderRadius:8,padding:"6px 10px",fontSize:13,fontFamily:"inherit",direction:"rtl",background:"#fff"}}
                placeholder="הכנס שם מלקט..."
                value={customer.pickerName||""}
                onChange={e=>onSetPickerName(e.target.value)}
                onBlur={e=>{ if(e.target.value.trim()) onSetInProgress(true); }}
              />
          }
        </div>
        {!customer.pickerName&&(
          <div style={{fontSize:11,color:"#dc2626",marginBottom:6}}>⚠️ יש להזין שם מלקט לפני הליקוט</div>
        )}
        <textarea style={{width:"100%",border:"1px solid #ddd6fe",borderRadius:8,padding:"8px",fontSize:12,fontFamily:"inherit",direction:"rtl",resize:"vertical",minHeight:44,background:"#fff",boxSizing:"border-box"}}
          placeholder="הערה כללית ללקוח..." value={customer.note||""} onChange={e=>onSetNote(e.target.value)}/>
      </div>
      <div style={{padding:"8px 12px 20px",position:"relative"}}>
        {!customer.pickerName&&(
          <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.85)",zIndex:5,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8}}>
            <div style={{textAlign:"center",color:"#92400e",fontSize:14,fontWeight:700,padding:20,background:"#fef3c7",borderRadius:12,border:"2px solid #fde68a"}}>
              🔒 הזן שם מלקט כדי להתחיל
            </div>
          </div>
        )}
        {customer.items.map(item=>(
          <CustItemRow key={item.id} item={item}
            onToggle={(id,f)=>customer.pickerName?onToggle(id,f):null}
            onSetMissingQty={(id,qty)=>customer.pickerName?onSetItemMissingQty(id,qty):null}/>
        ))}
        <div style={{padding:"8px 0 60px"}}>
          {!allMarked&&!customer.done&&<div style={{fontSize:12,color:"#f59e0b",textAlign:"center",marginBottom:8,fontWeight:600,background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"8px"}}>⚠️ יש לסמן את כל הפריטים ({remaining} ממתינים)</div>}
          <Btn onClick={()=>{if(allMarked||customer.done) onMarkDone();}} disabled={!allMarked&&!customer.done}
            style={{width:"100%",padding:"14px",borderRadius:12,border:"2px solid "+(customer.done?"#6b7280":allMarked?"#16a34a":"#d1d5db"),background:customer.done?"#6b7280":allMarked?"#16a34a":"#f3f4f6",color:customer.done?"#fff":allMarked?"#fff":"#9ca3af",fontSize:15,fontWeight:800,cursor:allMarked||customer.done?"pointer":"not-allowed",opacity:allMarked||customer.done?1:0.6,touchAction:"manipulation"}}>
            {customer.done?"↩️ בטל סיום":allMarked?"✅ סיים אריזה":"⬜ "+remaining+" פריטים ממתינים"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────────────
function Dashboard({pickState,custState,tasks,onAddTask,onSetTaskStatus,onDeleteTask,activeTab,onTabChange,onBack,onNavigate,onMarkMissingGlobal}) {
  const [showProdModal, setShowProdModal] = useState(false);
  const settlementKeys=Object.keys(pickState).filter(k=>k.startsWith("settlement_"));
  const totalS=settlementKeys.length;
  const doneS=settlementKeys.filter(k=>getSettlementDone(k.replace("settlement_",""),pickState,custState)).length;

  let totalI=0,pickedI=0;
  CLUSTERS.forEach(c=>{
    const cs=pickState["cluster_"+c.id];
    if(!cs) return;
    toArr(cs.products).forEach(p=>{
      totalI+=p.qty;
      let isPicked=p.picked;
      c.settlements.filter(s=>!isPersonal(s)).forEach(s=>{
        const sp=pickState["settlement_"+s]?.products.find(p2=>p2.name===p.name);
        if(sp?.picked) isPicked=true;
      });
      if(isPicked) pickedI+=p.qty;
    });
  });
  const _lSs=pickState["settlement_לוחמי הגטאות"];
  if(_lSs){totalI+=_lSs.products.reduce((s,p)=>s+p.qty,0);pickedI+=_lSs.products.filter(p=>p.picked).reduce((s,p)=>s+p.qty,0);}
  const _bmSs2=pickState["settlement_בנק מזרחי"];
  if(_bmSs2){totalI+=_bmSs2.products.reduce((s,p)=>s+p.qty,0);pickedI+=_bmSs2.products.filter(p=>p.picked).reduce((s,p)=>s+p.qty,0);}
  totalI+=2; // אריזה אישית — removed from data but part of total
  REMAINING.forEach(s=>{
    const ss=pickState["settlement_"+s];
    if(!ss) return;
    totalI+=toArr(ss.products).reduce((a,p)=>a+p.qty,0);
    pickedI+=toArr(ss.products).filter(p=>p.picked).reduce((a,p)=>a+p.qty,0);
  });
  totalI=Math.round(totalI); pickedI=Math.round(pickedI);

  // Build allMissing and allNotPicked
  const allMissing=[],allNotPicked=[],doneWithUntracked=[];
  // First: add cluster-level missing products (from cluster aggregate picking)
  CLUSTERS.forEach(c => {
    const ck="cluster_"+c.id;
    const cs=pickState[ck];
    const picker=cs.pickerName||"";
    c.settlements.filter(s=>!isPersonal(s)).forEach(s => {
      const sk="settlement_"+s;
      const ss=pickState[sk];
      if (!ss) return;
      toArr(cs.products).forEach(cp => {
        if (!cp.missing) return;
        const sp=toArr(ss.products).find(p=>p.name===cp.name);
        if (!sp || sp.missing) return; // already counted from settlement
        // Cluster has missing but settlement doesn't yet - count from cluster
        const entry={label:s,picker,customer:null,productName:cp.name,qty:cp.missingQty>0?cp.missingQty:cp.qty,totalQty:cp.qty,unit:cp.unit||"",note:cp.note,isCustomer:false};
        allMissing.push(entry);
      });
    });
  });
  settlementKeys.forEach(k=>{
    const settlement=k.replace("settlement_","");
    const picker=pickState[k].pickerName||"";
    const isDone=getSettlementDone(settlement,pickState,custState);
    const gk=custGroupKey(settlement); const custs=custState[gk]||[];
    if(isPersonal(settlement)&&custs.length>0){
      const custNP=[];
      custs.forEach(c=>c.items.forEach(it=>{
        // חוסרים מליקוט אישי לא מוצגים בדשבורד
        if(!it.picked&&!it.missing){allNotPicked.push({label:settlement,picker,customer:c.name,phone:c.phone,productName:it.text,missingQty:0,maxQty:it.maxQty||0,displayQty:0,unit:"",isCustomer:true});custNP.push({settlement,customer:c.name});}
      }));
      if(isDone&&custNP.length>0) doneWithUntracked.push({settlement,picker,items:custNP,isCustomer:true});
      // חוסרים ברמת המוצר (מהפריסה) עבור יישובים אישיים
      const ss=pickState[k];
      if(ss) toArr(ss.products).forEach(p=>{
        if(p.missing&&!p.picked) allMissing.push({label:settlement,picker,customer:null,productName:p.name,qty:p.missingQty>0?p.missingQty:p.qty,totalQty:p.qty,unit:p.unit,note:p.note,isCustomer:false});
      });
    } else {
      const prodNP=[];
      toArr(pickState[k].products).forEach(p=>{
        const entry={label:settlement,picker,customer:null,productName:p.name,qty:p.missingQty>0?p.missingQty:p.qty,totalQty:p.qty,unit:p.unit,note:p.note,isCustomer:false};
        if(p.missing&&!p.picked) allMissing.push(entry);
        else if(!p.picked&&!p.missing){allNotPicked.push(entry);prodNP.push(entry);}
      });
      if(isDone&&prodNP.length>0) doneWithUntracked.push({settlement,picker,items:prodNP,isCustomer:false});
    }
  });
  const notPickedI=allNotPicked.length;
  // Total missing qty (sum of all missing quantities, not entry count)
  const totalMissingQty = allMissing.reduce((s,m) => s + (parseFloat(m.qty)||0), 0);

  // Group by settlement
  const missingBySett={},notPickedBySett={};
  allMissing.forEach(m=>{if(!missingBySett[m.label])missingBySett[m.label]={picker:m.picker,items:[]};missingBySett[m.label].items.push(m);});
  allNotPicked.forEach(m=>{if(!notPickedBySett[m.label])notPickedBySett[m.label]={picker:m.picker,items:[]};notPickedBySett[m.label].items.push(m);});

  // byProduct for missing tab
  const byProduct={};
  allMissing.forEach(m=>{
    const key=m.productName;
    if(!byProduct[key]) byProduct[key]={productName:m.productName,unit:m.unit||"",totalMissing:0,settlements:[]};
    const qty=m.isCustomer?(m.missingQty>0?m.missingQty:m.maxQty||1):(parseFloat(m.qty)||0);
    byProduct[key].totalMissing+=qty;
    byProduct[key].settlements.push({...m,qty});
  });
  const productList=Object.values(byProduct).sort((a,b)=>b.totalMissing-a.totalMissing);

  const custNotes=[];
  const personalMissingList=[];
  Object.keys(custState).forEach(group=>{
    (custState[group]||[]).forEach(c=>{
      if(c.note||c.items.some(i=>i.missing||i.note)) custNotes.push({group,customer:c});
      // Build personal missing for billing tab
      const missingItems2=c.items.filter(i=>i.missing&&!i.picked);
      if(missingItems2.length>0){
        personalMissingList.push({
          group, settlement:group,
          customer:c.name, phone:c.phone,
          note:c.note||"",
          missingItems:missingItems2.map(it=>({
            text:it.text,
            missingQty:it.missingQty>0?it.missingQty:it.maxQty||0,
            maxQty:it.maxQty||0,
          }))
        });
      }
    });
  });

  return (
    <div style={S.app}>
      <div style={{...S.subHeader,borderBottom:"3px solid #1d4ed8",background:"#eff6ff"}}>
        <Btn onClick={onBack} style={S.backBtn}>→ חזרה</Btn>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:17,color:"#1d4ed8"}}>📊 דשבורד מנהל</div>
          <div style={{fontSize:11,color:"#6b7280"}}>תמונת מצב ליקוט</div>
        </div>
      </div>

      {/* Clickable stat boxes */}
      <div style={{display:"flex",gap:5,padding:"8px 8px 0",background:"#fff"}}>
        {[
          {t:"overview",icon:"🏘️",val:doneS+"/"+totalS,lbl:"יישובים",col:"#16a34a"},
          {t:"__products__",icon:"📦",val:pickedI+"/"+totalI,lbl:totalMissingQty>0?"⚠️ "+Math.round(totalMissingQty)+" חסרים":"פריטים",col:totalMissingQty>0?"#dc2626":"#2563eb"},
          {t:"missing",icon:"⚠️",val:Math.round(totalMissingQty),lbl:"חסרים",col:"#dc2626"},
          {t:"notpicked",icon:"🟡",val:notPickedI,lbl:"ממתינים",col:"#f59e0b"},
          {t:"tasks",icon:"📋",val:toArr(tasks||[]).filter(t=>t.status!=="done").length,lbl:"משימות",col:"#7c3aed"},
          {t:"personal_missing",icon:"🎁",val:personalMissingList.length,lbl:"אריזה אישית",col:"#0d9488"},
        ].map((box,i)=>(
          <div key={i} onClick={()=>box.t==="__products__"?setShowProdModal(true):onTabChange(box.t)} style={{flex:1,borderRadius:10,padding:"6px 2px",textAlign:"center",cursor:"pointer",background:activeTab===box.t?"#f0f9ff":"#f9fafb",border:"2px solid "+(activeTab===box.t?box.col:"transparent"),borderTop:"3px solid "+box.col}}>
            <div style={{fontSize:16}}>{box.icon}</div>
            <div style={{fontSize:15,fontWeight:700,color:box.col}}>{box.val}</div>
            <div style={{fontSize:9,color:"#9ca3af"}}>{box.lbl}</div>
          </div>
        ))}
      </div>
      {showProdModal && <ProductsModal pickState={pickState} custState={custState} onClose={()=>setShowProdModal(false)} onMarkMissing={onMarkMissingGlobal}/>}
      <div style={{height:8,background:"#f3f4f6"}}/>

      <div style={{padding:"10px 12px",paddingBottom:60}}>
        {/* Overview */}
        {activeTab==="overview"&&<>
          {/* ── מאקרו KPIs ── */}
          {/* 1. ליקוט */}
          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:14,padding:"14px",marginBottom:10}}>
            <div style={{fontWeight:800,color:"#1d4ed8",fontSize:15,marginBottom:8}}>🛒 מצב ליקוט</div>
            <div style={{height:10,background:"#dbeafe",borderRadius:999,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:Math.round(pickedI/Math.max(totalI,1)*100)+"%",background:"#2563eb",borderRadius:999}}/>
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",fontSize:12}}>
              <div style={{flex:1,background:"#fff",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:"#2563eb"}}>{Math.round(pickedI/Math.max(totalI,1)*100)}%</div>
                <div style={{color:"#6b7280"}}>לוקט</div>
              </div>
              <div style={{flex:1,background:"#fff",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:"#16a34a"}}>{doneS}/{totalS}</div>
                <div style={{color:"#6b7280"}}>יישובים הושלמו</div>
              </div>
              <div style={{flex:1,background:"#fff",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:800,color:"#f59e0b"}}>{totalS-doneS}</div>
                <div style={{color:"#6b7280"}}>נשארו</div>
              </div>
            </div>
          </div>

          {/* 1b. אריזה אישית progress */}
          {(() => {
            const allPersonalCusts = SPECIAL.flatMap(s => custState[custGroupKey(s)]||[]);
            const doneCusts = allPersonalCusts.filter(c=>c.done).length;
            const totalCusts = allPersonalCusts.length;
            const pendingCusts = totalCusts - doneCusts;
            return (
              <div onClick={()=>onTabChange("personal_missing")} style={{background:pendingCusts>0?"#fff7ed":"#f0fdf4",border:"1px solid "+(pendingCusts>0?"#fed7aa":"#86efac"),borderRadius:14,padding:"14px",marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:800,fontSize:15,color:pendingCusts>0?"#ea580c":"#15803d"}}>🎁 ממתין לאריזה אישית</div>
                  <div style={{height:6,background:"#e5e7eb",borderRadius:999,overflow:"hidden",marginTop:6,marginBottom:4,width:120}}>
                    <div style={{height:"100%",width:Math.round(doneCusts/Math.max(totalCusts,1)*100)+"%",background:pendingCusts>0?"#ea580c":"#16a34a",borderRadius:999}}/>
                  </div>
                  <div style={{fontSize:12,color:"#6b7280"}}>{doneCusts}/{totalCusts} לקוחות · {pendingCusts} ממתינים</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:32,fontWeight:800,color:pendingCusts>0?"#ea580c":"#16a34a"}}>{pendingCusts}</div>
                  <div style={{fontSize:10,color:"#9ca3af"}}>← פירוט</div>
                </div>
              </div>
            );
          })()}

          {/* 2. חוסרים */}
          <div onClick={()=>onTabChange("missing")} style={{background:totalMissingQty>0?"#fef2f2":"#f0fdf4",border:"1px solid "+(totalMissingQty>0?"#fca5a5":"#86efac"),borderRadius:14,padding:"14px",marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:totalMissingQty>0?"#dc2626":"#15803d"}}>⚠️ חוסרים</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>
                {totalMissingQty===0?"אין חוסרים ✅":Math.round(totalMissingQty)+" יחידות חסרות"}
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:32,fontWeight:800,color:totalMissingQty>0?"#dc2626":"#16a34a"}}>{Math.round(totalMissingQty)}</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>← פירוט</div>
            </div>
          </div>

          {/* 3. אריזה אישית */}
          <div onClick={()=>onTabChange("personal_missing")} style={{background:personalMissingList.length>0?"#fff7ed":"#f0fdfa",border:"1px solid "+(personalMissingList.length>0?"#fed7aa":"#99f6e4"),borderRadius:14,padding:"14px",marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:personalMissingList.length>0?"#ea580c":"#0d9488"}}>🎁 אריזה אישית</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>
                {personalMissingList.length===0?"אין חוסרים ✅":personalMissingList.length+" לקוחות עם חוסרים"}
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:32,fontWeight:800,color:personalMissingList.length>0?"#ea580c":"#0d9488"}}>{personalMissingList.length}</div>
              <div style={{fontSize:10,color:"#9ca3af"}}>← פירוט</div>
            </div>
          </div>

          {/* 4. משימות */}
          <div onClick={()=>onTabChange("tasks")} style={{background:toArr(tasks||[]).filter(t=>t.status!=="done").length>0?"#faf5ff":"#f0fdf4",border:"1px solid "+(toArr(tasks||[]).filter(t=>t.status!=="done").length>0?"#ddd6fe":"#86efac"),borderRadius:14,padding:"14px",marginBottom:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:toArr(tasks||[]).filter(t=>t.status!=="done").length>0?"#6d28d9":"#15803d"}}>📋 משימות</div>
              <div style={{display:"flex",gap:8,marginTop:4,fontSize:12}}>
                {toArr(tasks||[]).filter(t=>t.status==="open").length>0&&<span style={{color:"#dc2626",fontWeight:600}}>🔴 {toArr(tasks||[]).filter(t=>t.status==="open").length}</span>}
                {toArr(tasks||[]).filter(t=>t.status==="inprogress").length>0&&<span style={{color:"#f59e0b",fontWeight:600}}>🟡 {toArr(tasks||[]).filter(t=>t.status==="inprogress").length}</span>}
                {toArr(tasks||[]).filter(t=>t.status==="done").length>0&&<span style={{color:"#16a34a",fontWeight:600}}>🟢 {toArr(tasks||[]).filter(t=>t.status==="done").length}</span>}
                {toArr(tasks||[]).length===0&&<span style={{color:"#9ca3af"}}>אין משימות</span>}
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:32,fontWeight:800,color:toArr(tasks||[]).filter(t=>t.status!=="done").length>0?"#7c3aed":"#16a34a"}}>
                {toArr(tasks||[]).filter(t=>t.status!=="done").length}
              </div>
              <div style={{fontSize:10,color:"#9ca3af"}}>← פירוט</div>
            </div>
          </div>



          {/* Untracked warning */}
          {doneWithUntracked.length>0&&(
            <div style={{background:"#fffbeb",border:"2px solid #f59e0b",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
              <div style={{fontWeight:700,color:"#92400e",fontSize:13,marginBottom:8}}>⚠️ יישובים שהושלמו עם פריטים לא מסומנים:</div>
              {doneWithUntracked.map((d,i)=>(
                <div key={i} style={{background:"#fff",border:"1px solid #fde68a",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontWeight:700,color:"#92400e"}}>{d.settlement}</span>
                    <span style={{fontSize:11,color:"#f59e0b"}}>{d.items.length} פריטים</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>}

        {/* Missing */}
        {activeTab==="missing"&&(
          productList.length===0
            ? <div style={{textAlign:"center",color:"#16a34a",padding:"40px 0",fontSize:16}}>✅ אין חסרים!</div>
            : <>
                <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontWeight:700,color:"#dc2626",fontSize:13}}>⚠️ {productList.length} מוצרים חסרים</span>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{Math.round(totalMissingQty)} יחידות · {[...new Set(allMissing.map(m=>m.label))].length} יישובים</span>
                  </div>

                </div>
                {productList.map((prod,pi)=>(
                  <div key={pi} style={{background:"#fff",border:"2px solid #fca5a5",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
                    <div style={{background:"#fef2f2",padding:"10px 14px",borderBottom:"1px solid #fecaca",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontWeight:800,fontSize:15,color:"#111"}}>{prod.productName}</div>
                      <div style={{textAlign:"center",background:"#dc2626",borderRadius:10,padding:"4px 12px",minWidth:48}}>
                        <div style={{fontSize:16,fontWeight:800,color:"#fff"}}>{prod.totalMissing}</div>
                        {prod.unit&&<div style={{fontSize:9,color:"#fecaca"}}>{prod.unit}</div>}
                      </div>
                    </div>
                    {prod.settlements.map((s,si)=>(
                      <div key={si} onClick={()=>onNavigate(s.label||s.settlement)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",borderBottom:si<prod.settlements.length-1?"1px solid #fef2f2":"none",background:si%2===0?"#fff":"#fff5f5",cursor:"pointer"}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>{s.label||s.settlement}</span>
                            {s.isCustomer&&<span style={{fontSize:10,background:"#faf5ff",color:"#7c3aed",padding:"1px 6px",borderRadius:6,fontWeight:600}}>👤</span>}
                            <span style={{fontSize:10,color:"#9ca3af"}}>← עדכן</span>
                          </div>
                          {s.customer&&<div style={{fontSize:11,color:"#6d28d9",marginTop:1}}>{s.customer} {s.phone?"· 📞"+s.phone:""}</div>}
                        </div>
                        <div style={{textAlign:"center",minWidth:48}}>
                          {s.isCustomer
                            ? <div>
                                <div style={{fontSize:14,fontWeight:800,color:"#dc2626"}}>{s.missingQty>0?s.missingQty:s.maxQty||"?"}</div>
                                {s.missingQty>0&&s.maxQty>0&&s.missingQty<s.maxQty&&<div style={{fontSize:10,color:"#9ca3af"}}>מתוך {s.maxQty}</div>}
                              </div>
                            : <div style={{fontSize:14,fontWeight:800,color:"#dc2626"}}>{s.qty}</div>
                          }
                        </div>
                        <span style={{fontSize:16,color:"#dc2626"}}>›</span>
                      </div>
                    ))}
                  </div>
                ))}
              </>
        )}

        {/* Not picked */}
        {activeTab==="notpicked"&&(
          allNotPicked.length===0
            ? <div style={{textAlign:"center",color:"#16a34a",padding:"40px 0",fontSize:16}}>✅ הכל לוקט!</div>
            : <>
                <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontWeight:700,color:"#92400e",fontSize:13}}>🟡 {notPickedI} פריטים ממתינים</span>
                  <span style={{fontSize:11,color:"#9ca3af"}}>{Object.keys(notPickedBySett).length} יישובים</span>
                </div>
                {Object.entries(notPickedBySett).sort(([a],[b])=>a.localeCompare(b,"he")).map(([settlement,{picker,items}])=>{
                  const reg=items.filter(m=>!m.isCustomer), cust=items.filter(m=>m.isCustomer);
                  return (
                    <div key={settlement} style={{background:"#fff",border:"2px solid #fde68a",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
                      <div style={{background:"#fffbeb",padding:"10px 14px",borderBottom:"1px solid #fde68a",display:"flex",justifyContent:"space-between"}}>
                        <div>
                          <span style={{fontWeight:800,fontSize:15,color:"#92400e"}}>🟡 {settlement}</span>
                          <span style={{fontSize:11,color:"#78350f",display:"block",marginTop:2}}>
                            {reg.length>0?reg.length+" פריטים":""}{reg.length>0&&cust.length>0?" · ":""}{cust.length>0?cust.length+" אריזות אישיות":""}
                          </span>
                        </div>
                        {picker&&<span style={{fontSize:11,color:"#7c3aed",fontWeight:600}}>👷 {picker}</span>}
                      </div>
                      {reg.map((m,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"9px 14px",borderBottom:i<reg.length-1?"1px solid #fef9c3":"none",background:i%2===0?"#fff":"#fffde7"}}>
                          <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>{m.productName}</span>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:14,fontWeight:800,color:"#92400e"}}>{m.qty}</div>
                            <div style={{fontSize:10,color:"#9ca3af"}}>{m.unit}</div>
                          </div>
                        </div>
                      ))}
                      {cust.length>0&&<>
                        <div style={{padding:"6px 14px",background:"#faf5ff",borderTop:reg.length>0?"2px dashed #fde68a":"none",fontSize:11,color:"#7c3aed",fontWeight:600}}>👤 אריזה אישית:</div>
                        {cust.map((m,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 14px",borderBottom:i<cust.length-1?"1px solid #f3f4f6":"none",background:i%2===0?"#faf5ff":"#f5f3ff"}}>
                            <div>
                              <div style={{fontSize:12,fontWeight:700,color:"#6d28d9"}}>{m.customer}</div>
                              <div style={{fontSize:13,color:"#374151"}}>{m.productName}</div>
                            </div>
                            <span style={{fontSize:11,background:"#fef3c7",color:"#92400e",padding:"3px 10px",borderRadius:20,fontWeight:700,alignSelf:"center"}}>🟡</span>
                          </div>
                        ))}
                      </>}
                    </div>
                  );
                })}
              </>
        )}

        {/* Personal missing inside missing tab too */}
        {activeTab==="missing" && personalMissingList.length>0&&(
          <div style={{marginTop:16}}>
            <div style={{fontWeight:700,fontSize:13,color:"#0d9488",marginBottom:10,paddingTop:8,borderTop:"2px dashed #99f6e4"}}>
              🎁 חוסרים — אריזה אישית ({personalMissingList.length} לקוחות)
            </div>
            {personalMissingList.map((entry,ei)=>(
              <div key={ei} style={{background:"#f0fdfa",border:"1px solid #99f6e4",borderRadius:10,marginBottom:8,overflow:"hidden"}}>
                <div style={{background:"#ccfbf1",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}
                  onClick={()=>{
                    const gk=entry.group;
                    const custs=custState[gk]||[];
                    const cust=custs.find(c=>c.name===entry.customer);
                    if(cust) onNavigate(entry.settlement,cust.id);
                  }}>
                  <div>
                    <span style={{fontWeight:700,color:"#0f766e"}}>{entry.customer}</span>
                    <span style={{fontSize:11,color:"#9ca3af",marginRight:8}}>· {entry.settlement} · 📞{entry.phone}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#0d9488"}}>{entry.missingItems.length} חסרים</span>
                    <span style={{fontSize:11,color:"#0d9488"}}>← עדכן</span>
                  </div>
                </div>
                {entry.missingItems.map((it,ii)=>(
                  <div key={ii} style={{display:"flex",justifyContent:"space-between",padding:"7px 14px",borderBottom:ii<entry.missingItems.length-1?"1px solid #f0fdfa":"none",background:ii%2===0?"#fff":"#f0fdfa",fontSize:12}}>
                    <span style={{color:"#374151"}}>{it.text}</span>
                    <span style={{color:"#dc2626",fontWeight:700}}>
                      {it.missingQty>0&&it.maxQty>0&&it.missingQty<it.maxQty?`חסר ${it.missingQty}/${it.maxQty}`:"⚠️ חסר הכל"}
                    </span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* Personal missing - billing tab */}
                {activeTab==="personal_missing"&&(
          (() => {
            // Build per-settlement status
            const settlementStatus = SPECIAL.map(sett => {
              const custs = custState[custGroupKey(sett)]||[];
              const done = custs.filter(c=>c.done);
              const inProg = custs.filter(c=>c.inProgress&&!c.done);
              const waiting = custs.filter(c=>!c.inProgress&&!c.done);
              return {sett, custs, done, inProg, waiting};
            });
            const totalDone = settlementStatus.reduce((a,s)=>a+s.done.length,0);
            const totalAll = settlementStatus.reduce((a,s)=>a+s.custs.length,0);
            return (
              <>
                <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,color:"#15803d",fontSize:13}}>🎁 תמונת מצב אריזה אישית</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#15803d"}}>{totalDone}/{totalAll} לוקטו</span>
                </div>
                {settlementStatus.map(({sett,custs,done,inProg,waiting})=>(
                  <div key={sett} style={{background:"#fff",border:"2px solid #ede9fe",borderRadius:12,marginBottom:12,overflow:"hidden"}}>
                    {/* Settlement header */}
                    <div style={{background:"#faf5ff",padding:"10px 14px",borderBottom:"1px solid #ede9fe",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontWeight:800,fontSize:15,color:"#6d28d9"}}>👤 {sett}</span>
                      <span style={{fontSize:12,color:"#6b7280"}}>{done.length}/{custs.length} הושלמו</span>
                    </div>
                    {/* Done customers */}
                    {done.length>0&&(
                      <div style={{padding:"8px 14px",borderBottom:inProg.length>0||waiting.length>0?"1px solid #f3f4f6":"none"}}>
                        <div style={{fontSize:11,color:"#15803d",fontWeight:700,marginBottom:6}}>✅ לוקטו ({done.length})</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {done.map((c,i)=>(
                            <div key={i} style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#15803d",fontWeight:600}}>
                              {c.name}
                              {c.pickerName&&<span style={{fontSize:10,color:"#9ca3af",marginRight:4}}>· 👷{c.pickerName}</span>}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {/* In progress */}
                    {inProg.length>0&&(
                      <div style={{padding:"8px 14px",borderBottom:waiting.length>0?"1px solid #f3f4f6":"none"}}>
                        <div style={{fontSize:11,color:"#f59e0b",fontWeight:700,marginBottom:6}}>🔄 בתהליך ({inProg.length})</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {inProg.map((c,i)=>(
                            <div key={i} onClick={()=>onNavigate(sett,c.id)} style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#92400e",fontWeight:600,cursor:"pointer"}}>
                              {c.name}
                              {c.pickerName&&<span style={{fontSize:10,color:"#9ca3af",marginRight:4}}>· 👷{c.pickerName}</span>}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {/* Waiting */}
                    {waiting.length>0&&(
                      <div style={{padding:"8px 14px"}}>
                        <div style={{fontSize:11,color:"#9ca3af",fontWeight:700,marginBottom:6}}>⏳ ממתינים ({waiting.length})</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {waiting.map((c,i)=>(
                            <div key={i} style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:8,padding:"4px 10px",fontSize:12,color:"#6b7280"}}>
                              {c.name}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </>
            );
          })()
        )}


        {/* Tasks tab */}
        {activeTab==="tasks"&&(
          <TasksPanel tasks={tasks||[]} onAdd={onAddTask} onSetStatus={onSetTaskStatus} onDelete={onDeleteTask}/>
        )}
      </div>
    </div>
  );
}

// ── Tiny components ────────────────────────────────────────────
function Btn({onClick,style={},children,disabled}) {
  return <button onClick={onClick} disabled={disabled} style={{border:"none",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:13,...style}}>{children}</button>;
}
function StatBox({icon,val,lbl,col}) {
  return (
    <div style={{flex:1,background:"#f9fafb",borderRadius:10,padding:"6px 4px",textAlign:"center",borderTop:"3px solid "+col}}>
      <div style={{fontSize:18}}>{icon}</div>
      <div style={{fontSize:18,fontWeight:700,color:col}}>{val}</div>
      <div style={{fontSize:10,color:"#9ca3af"}}>{lbl}</div>
    </div>
  );
}
function StatPill({icon,val,col}) {
  return (
    <div style={{background:"#fff",border:"1px solid "+col+"30",borderRadius:8,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
      <span style={{fontSize:13}}>{icon}</span>
      <span style={{fontWeight:700,color:col,fontSize:13}}>{val}</span>
    </div>
  );
}
const S = {
  app:{background:"#f9fafb",minHeight:"100vh",fontFamily:"'Heebo','Arial Hebrew',Arial,sans-serif",direction:"rtl",maxWidth:600,margin:"0 auto"},
  header:{background:"linear-gradient(135deg,#1e40af 0%,#3b82f6 100%)",padding:"16px 16px 14px",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between"},
  h1:{fontSize:20,fontWeight:800,letterSpacing:-0.5},
  h2:{fontSize:11,opacity:0.8,marginTop:2},
  sectionLabel:{padding:"14px 16px 8px",fontWeight:700,fontSize:13,color:"#374151"},
  subHeader:{padding:"12px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10},
  backBtn:{background:"#f3f4f6",color:"#374151"},
};

// ── Products Modal ────────────────────────────────────────────
function ProductsModal({pickState, custState, onClose, onMarkMissing}) {
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all"); // all | picked | pending

  // Aggregate all products from all settlements (non-personal) + clusters
  // Use settlement products for accurate per-settlement data
  const productMap = {};

  // From ALL settlement products (including personal settlements)
  Object.keys(pickState).filter(k=>k.startsWith("settlement_")).forEach(k=>{
    const s = k.replace("settlement_","");
    toArr(pickState[k].products).forEach(p => {
      if (!productMap[p.name]) productMap[p.name] = {name:p.name, unit:p.unit, totalQty:0, pickedQty:0, missingQty:0};
      productMap[p.name].totalQty += p.qty;
      if (p.picked) productMap[p.name].pickedQty += p.qty;
      if (p.missing) productMap[p.name].missingQty += (p.missingQty||p.qty);
    });
  });

  const products = Object.values(productMap)
    .filter(p => p.totalQty > 0)
    .filter(p => !search || p.name.includes(search))
    .filter(p => {
      if (filter==="picked") return p.pickedQty >= p.totalQty;
      if (filter==="pending") return p.pickedQty < p.totalQty && !p.missingQty;
      if (filter==="missing") return p.missingQty > 0;
      return true;
    })
    .sort((a,b) => (CSV_PRODUCT_ORDER[a.name]??9999) - (CSV_PRODUCT_ORDER[b.name]??9999));

  const totalAll = Object.values(productMap).reduce((s,p)=>s+p.totalQty,0);
  const pickedAll = Object.values(productMap).reduce((s,p)=>s+p.pickedQty,0);
  const pendingAll = Object.values(productMap).filter(p=>p.pickedQty<p.totalQty&&!p.missingQty).length;
  const missingAll = Object.values(productMap).filter(p=>p.missingQty>0).length;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:600,maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
        {/* Header */}
        <div style={{padding:"16px 16px 12px",borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{fontWeight:800,fontSize:17,color:"#111"}}>📦 סקירת מוצרים</div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>
              {Math.round(pickedAll)}/{Math.round(totalAll)} יחידות לוקטו ·
              <span style={{color:"#f59e0b"}}> {pendingAll} ממתינים</span>
              {missingAll>0&&<span style={{color:"#dc2626"}}> · {missingAll} חסרים</span>}
            </div>
          </div>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,border:"1px solid #e5e7eb",background:"#f3f4f6",cursor:"pointer",fontSize:18,fontWeight:700,color:"#374151",padding:0}}>×</button>
        </div>

        {/* Progress bar */}
        <div style={{padding:"8px 16px",background:"#f9fafb",borderBottom:"1px solid #e5e7eb",flexShrink:0}}>
          <div style={{height:8,background:"#e5e7eb",borderRadius:999,overflow:"hidden",marginBottom:4}}>
            <div style={{height:"100%",width:Math.round(pickedAll/Math.max(totalAll,1)*100)+"%",background:"#2563eb",borderRadius:999,transition:"width 0.3s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6b7280"}}>
            <span>לוקט: {Math.round(pickedAll/Math.max(totalAll,1)*100)}%</span>
            <span>נשאר: {Math.round(totalAll-pickedAll)} יחידות</span>
          </div>
        </div>

        {/* Filter + search */}
        <div style={{padding:"8px 12px",borderBottom:"1px solid #e5e7eb",display:"flex",gap:6,flexShrink:0,flexWrap:"wrap"}}>
          {[["all","הכל"],["pending","ממתין"],["missing","חסר"],["picked","לוקט"]].map(([f,lbl])=>(
            <button key={f} onClick={()=>setFilter(f)}
              style={{borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600,border:"none",cursor:"pointer",
                background:filter===f?"#2563eb":"#f3f4f6",color:filter===f?"#fff":"#374151"}}>
              {lbl}
            </button>
          ))}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש מוצר..."
            style={{flex:1,border:"1px solid #e5e7eb",borderRadius:8,padding:"4px 10px",fontSize:12,fontFamily:"inherit",direction:"rtl",minWidth:80,outline:"none"}}/>
        </div>

        {/* Products list */}
        <div style={{overflowY:"auto",flex:1,padding:"8px 12px 20px"}}>
          {products.map((p,i) => {
            const pct = Math.round(p.pickedQty/Math.max(p.totalQty,1)*100);
            const allPicked = p.pickedQty >= p.totalQty;
            const hasMissing = p.missingQty > 0;
            const remaining = Math.max(0, p.totalQty - p.pickedQty);
            return (
              <div key={p.name} style={{
                padding:"10px 12px",marginBottom:6,borderRadius:10,
                background:allPicked?"#f0fdf4":hasMissing?"#fef2f2":"#fff",
                border:"1px solid "+(allPicked?"#86efac":hasMissing?"#fca5a5":"#e5e7eb")
              }}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:allPicked?"#15803d":hasMissing?"#dc2626":"#111",
                      textDecoration:allPicked?"line-through":"none"}}>
                      {p.name}
                    </div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{p.unit}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {!allPicked && onMarkMissing && (
                      <button
                        onClick={()=>onMarkMissing(p.name, !hasMissing)}
                        style={{
                          padding:"4px 10px",borderRadius:8,border:"2px solid "+(hasMissing?"#dc2626":"#e5e7eb"),
                          background:hasMissing?"#dc2626":"#fff",color:hasMissing?"#fff":"#9ca3af",
                          fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
                          whiteSpace:"nowrap",touchAction:"manipulation"
                        }}>
                        {hasMissing?"⚠️ חסר":"חסר"}
                      </button>
                    )}
                    <div style={{textAlign:"left"}}>
                      <div style={{fontSize:13,fontWeight:800,color:allPicked?"#15803d":"#2563eb"}}>
                        {Math.round(p.pickedQty)}/{Math.round(p.totalQty)}
                      </div>
                      {hasMissing&&<div style={{fontSize:10,color:"#dc2626",fontWeight:600}}>⚠️ {Math.round(p.missingQty)}</div>}
                      {!allPicked&&!hasMissing&&<div style={{fontSize:10,color:"#f59e0b"}}>נשאר {Math.round(remaining)}</div>}
                    </div>
                  </div>
                </div>
                <div style={{height:5,background:"#e5e7eb",borderRadius:999,overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:allPicked?"#16a34a":hasMissing?"#ef4444":"#2563eb",borderRadius:999}}/>
                </div>
              </div>
            );
          })}
          {products.length===0&&<div style={{textAlign:"center",color:"#9ca3af",padding:"40px 0"}}>אין מוצרים</div>}
        </div>
      </div>
    </div>
  );
}

// ── Tasks Panel ───────────────────────────────────────────────
const TASK_STATUS = {
  open:       {label:"לא טופל", bg:"#fef2f2", col:"#dc2626", next:"inprogress"},
  inprogress: {label:"בטיפול",  bg:"#fffbeb", col:"#f59e0b", next:"done"},
  done:       {label:"בוצע",   bg:"#f0fdf4", col:"#16a34a", next:"open"},
};

function TaskRow({task, onSetStatus, onDelete}) {
  const s = TASK_STATUS[task.status] || TASK_STATUS.open;
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"#fff",border:"1px solid #e5e7eb",borderRadius:10,marginBottom:8}}>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,color:task.status==="done"?"#9ca3af":"#111",textDecoration:task.status==="done"?"line-through":"none"}}>{task.text}</div>
        <div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>{task.createdAt}</div>
      </div>
      <button onClick={()=>onSetStatus(task.id,s.next)}
        style={{padding:"5px 12px",borderRadius:20,border:"2px solid "+s.col,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,background:s.bg,color:s.col,whiteSpace:"nowrap",touchAction:"manipulation"}}>
        {s.label}
      </button>
      <button onClick={()=>onDelete(task.id)}
        style={{width:28,height:28,borderRadius:6,border:"1px solid #e5e7eb",background:"#fff",cursor:"pointer",fontSize:16,color:"#9ca3af",padding:0,touchAction:"manipulation"}}>×</button>
    </div>
  );
}

function TasksPanel({tasks,onAdd,onSetStatus,onDelete}) {
  const [text,setText] = useState("");
  const open = toArr(tasks||[]).filter(t=>t.status==="open");
  const prog = toArr(tasks||[]).filter(t=>t.status==="inprogress");
  const done = toArr(tasks||[]).filter(t=>t.status==="done");

  return (
    <div style={{paddingBottom:60}}>
      <div style={{display:"flex",gap:8,marginBottom:16,padding:"4px 0"}}>
        <input
          value={text} onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&text.trim()){onAdd(text);setText("");} }}
          placeholder="כתוב משימה חדשה..."
          style={{flex:1,border:"2px solid #ddd6fe",borderRadius:10,padding:"10px 12px",fontSize:13,fontFamily:"inherit",direction:"rtl",outline:"none"}}
        />
        <button onClick={()=>{if(text.trim()){onAdd(text);setText("");}}}
          style={{padding:"10px 16px",borderRadius:10,border:"none",background:"#7c3aed",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13,touchAction:"manipulation"}}>
          + הוסף
        </button>
      </div>
      {open.length>0&&<>
        <div style={{fontSize:12,fontWeight:700,color:"#dc2626",marginBottom:8}}>🔴 לא טופל ({open.length})</div>
        {open.map(t=><TaskRow key={t.id} task={t} onSetStatus={onSetStatus} onDelete={onDelete}/>)}
      </>}
      {prog.length>0&&<>
        <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",marginBottom:8,marginTop:12}}>🟡 בטיפול ({prog.length})</div>
        {prog.map(t=><TaskRow key={t.id} task={t} onSetStatus={onSetStatus} onDelete={onDelete}/>)}
      </>}
      {done.length>0&&<>
        <div style={{fontSize:12,fontWeight:700,color:"#16a34a",marginBottom:8,marginTop:12}}>🟢 בוצע ({done.length})</div>
        {done.map(t=><TaskRow key={t.id} task={t} onSetStatus={onSetStatus} onDelete={onDelete}/>)}
      </>}
      {toArr(tasks||[]).length===0&&<div style={{textAlign:"center",color:"#9ca3af",padding:"40px 0",fontSize:14}}>אין משימות. כתוב משימה למעלה.</div>}
    </div>
  );
}

// Global error handler — show message instead of white screen
window.onerror = function(msg, src, line, col, err) {
  const el = document.getElementById('root');
  if (el && el.innerHTML === '') {
    el.innerHTML = '<div style="padding:20px;direction:rtl;font-family:Arial"><h2>⚠️ שגיאה בטעינה</h2><p>' + msg + '</p><p>שורה: ' + line + '</p><button onclick="location.reload()">רענן</button></div>';
  }
};
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App/></ErrorBoundary>);

</script>
